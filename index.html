<!DOCTYPE html>
<html lang="no">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bohdan's Prosjekter - Liste over Underdomener</title>
    <style>
        @font-face {
            font-family: 'Chalkboard';
            src: url('Chalkboard-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: #000;
            margin: 0;
            font-family: 'Chalkboard', cursive;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            color: #fff;
        }

        div.background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.5;
            filter: blur(5px);
            background: url(/img/background.webp) center no-repeat;
            background-size: cover;
            z-index: -1;
            animation: back 5s ease-in-out infinite;
        }

        div.content {
            min-height: 100%;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            font-size: clamp(40px, 10vw, 60px);
            margin: 0;
            text-align: center;
            color: #1bc7fb;
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.5));
        }

        table {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            margin: 20px 0;
        }

        thead {
            background: #1bc7fb;
            color: #fff;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            font-weight: 600;
        }

        tbody tr {
            transition: background-color 0.3s, transform 0.3s;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.);
            transform: translateY(-2px);
        }

        a {
            color: #1bc7fb;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        @keyframes back {
            50% {
                filter: blur(3px);
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="content">
        <h1>Prosjekter Liste</h1>
        <table>
            <thead>
                <tr>
                    <th>Prosjektnavn</th>
                    <th>Beskrivelse</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>21-08-2024</td>
                    <td><a href="https://21-08-2024.bohdan.lol" target="_blank">21-08-2024.bohdan.lol</a></td>
                </tr>
                <tr>
                    <td>Prosjekt 2</td>
                    <td><a href="https://26-08-2024.bohdan.lol" target="_blank">26-08-2024.bohdan.lol</a></td>
                </tr>
                <tr>
                    <td>Prosjekt 3</td>
                    <td><a href="https://nudes.bohdan.lol" target="_blank">For fun</a></td>
                </tr>
                <!-- Legg til flere rader her -->
            </tbody>
        </table>
    </div>
</body>
</html>
